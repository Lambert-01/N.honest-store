<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.Honest Customer Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- EmailJS Configuration -->
    <script type="text/javascript" src="../js/emailConfig.js"></script>
    <!-- Google Sign-In API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="../images/f.logo.png" alt="N.Honest Logo">
        </div>
        <div class="alert alert-danger" id="error-alert"></div>
        <div class="alert alert-success" id="success-alert"></div>
        
        <form id="login-form">
            <h2 class="text-center mb-4">Customer Login</h2>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3 text-end">
                <a href="#" id="forgot-password-link">Forgot Password?</a>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
                <a href="/client-signup" class="btn btn-outline-secondary">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </a>
                
                <div class="separator my-3">OR</div>
                
                <!-- Google Sign-In Button -->
                <div id="g_id_onload"
                     data-client_id="914503703808-tu23o5a8ta4ukhenpdqi1m2i9ag81hq0.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false"
                     data-itp_support="true"
                     data-log_level="debug">
                </div>
                
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="center"
                     data-width="100%">
                </div>
            </div>
        </form>
        
        <!-- Forgot Password Form (hidden by default) -->
        <form id="forgot-password-form" style="display: none;">
            <h2 class="text-center mb-4">Reset Password</h2>
            <p class="text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            
            <div class="mb-3">
                <label for="reset-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="reset-email" name="email" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                </button>
                <button type="button" id="back-to-login" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Back to Login
                </button>
            </div>
        </form>
        
        <!-- Resend Verification Form (hidden by default) -->
        <form id="resend-verification-form" style="display: none;">
            <h2 class="text-center mb-4">Resend Verification Email</h2>
            <p class="text-center mb-4">Enter your email address and we'll send you a new verification link.</p>
            
            <div class="mb-3">
                <label for="verification-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="verification-email" name="email" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane me-2"></i>Resend Verification
                </button>
                <button type="button" id="back-to-login-from-verification" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Back to Login
                </button>
            </div>
        </form>
        
        <div class="mt-3 text-center">
            <a href="/" class="btn btn-link">
                <i class="fas fa-home me-2"></i>Back to Store
            </a>
        </div>
    </div>

    <!-- Load external JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/client-login.js"></script>
    
    <style>
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: #6c757d;
        }
        
        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }
        
        .separator::before {
            margin-right: 1em;
        }
        
        .separator::after {
            margin-left: 1em;
        }
    </style>
</body>
</html>
